name: Build and Release rsbox

on:
  push:
    branches: [ main, master ]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --release --verbose

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')" >> $GITHUB_OUTPUT

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsbox-windows-x64-${{ steps.version.outputs.VERSION }}
          path: target/release/rsbox.exe
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --release --verbose

      - name: Get version
        id: version
        run: echo "VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')" >> $GITHUB_OUTPUT

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsbox-linux-x64-${{ steps.version.outputs.VERSION }}
          path: target/release/rsbox
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --release --verbose

      - name: Get version
        id: version
        run: echo "VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')" >> $GITHUB_OUTPUT

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsbox-macos-x64-${{ steps.version.outputs.VERSION }}
          path: target/release/rsbox
          retention-days: 7

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release archives
        run: |
          cd artifacts
          # Windows
          cd rsbox-windows-x64-${{ steps.version.outputs.VERSION }}
          zip ../../rsbox-${{ steps.version.outputs.VERSION }}-windows-x64.zip rsbox.exe
          cd ..
          # Linux
          cd rsbox-linux-x64-${{ steps.version.outputs.VERSION }}
          tar czf ../../rsbox-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz rsbox
          cd ..
          # macOS
          cd rsbox-macos-x64-${{ steps.version.outputs.VERSION }}
          tar czf ../../rsbox-${{ steps.version.outputs.VERSION }}-macos-x64.tar.gz rsbox
          cd ../..

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            rsbox-${{ steps.version.outputs.VERSION }}-windows-x64.zip
            rsbox-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz
            rsbox-${{ steps.version.outputs.VERSION }}-macos-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
