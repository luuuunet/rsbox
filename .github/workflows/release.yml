name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  CARGO_TERM_COLOR: always
  # Release CI: suppress rustc unused-import noise (warnings do not fail the build)
  RUSTFLAGS: "-Awarnings"

permissions:
  contents: write

jobs:
  build-desktop:
    name: Desktop (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rsbox
            asset_name: rsbox-linux-x86_64
            use_cross: false

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: rsbox
            asset_name: rsbox-linux-aarch64
            use_cross: true

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rsbox.exe
            asset_name: rsbox-windows-x86_64.exe
            use_cross: false

          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: rsbox
            asset_name: rsbox-macos-aarch64
            use_cross: false

          - os: macos-14
            target: x86_64-apple-darwin
            artifact_name: rsbox
            asset_name: rsbox-macos-x86_64
            use_cross: false

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-desktop-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-desktop-${{ matrix.target }}-

      - name: Build with cargo
        if: "!matrix.use_cross"
        run: cargo build --release -p rsbox --target ${{ matrix.target }} --features rsb-protocol/ssh-vendored

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release -p rsbox --target ${{ matrix.target }} --features rsb-protocol/ssh-vendored

      - name: Strip binary (Unix)
        if: runner.os != 'Windows' && !matrix.use_cross
        run: strip "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"

      - name: Prepare release asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  build-android:
    name: Android (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            arch: arm64-v8a
          - target: armv7-linux-androideabi
            arch: armeabi-v7a
          - target: x86_64-linux-android
            arch: x86_64

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Setup Android environment
        run: |
          NDK="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=$NDK/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=$NDK/aarch64-linux-android21-clang++" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "CC_armv7_linux_androideabi=$NDK/armv7a-linux-androideabi21-clang" >> $GITHUB_ENV
          echo "CXX_armv7_linux_androideabi=$NDK/armv7a-linux-androideabi21-clang++" >> $GITHUB_ENV
          echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$NDK/armv7a-linux-androideabi21-clang" >> $GITHUB_ENV
          echo "CC_x86_64_linux_android=$NDK/x86_64-linux-android21-clang" >> $GITHUB_ENV
          echo "CXX_x86_64_linux_android=$NDK/x86_64-linux-android21-clang++" >> $GITHUB_ENV
          echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=$NDK/x86_64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$NDK/llvm-ar" >> $GITHUB_ENV
          echo "AR_armv7_linux_androideabi=$NDK/llvm-ar" >> $GITHUB_ENV
          echo "AR_x86_64_linux_android=$NDK/llvm-ar" >> $GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-android-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-android-${{ matrix.target }}-

      - name: Build rsb-libbox
        run: cargo build --release -p rsb-libbox --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/librsb_libbox.so" "dist/librsb_libbox-android-${{ matrix.arch }}.so"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: rsb-libbox-android-${{ matrix.arch }}
          path: dist/librsb_libbox-android-${{ matrix.arch }}.so
          if-no-files-found: error

  build-ios:
    name: iOS (${{ matrix.name }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-ios
            name: device-arm64
          - target: x86_64-apple-ios
            name: simulator-x86_64
          - target: aarch64-apple-ios-sim
            name: simulator-arm64

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-ios-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-ios-${{ matrix.target }}-

      - name: Build rsb-libbox
        run: cargo build --release -p rsb-libbox --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/librsb_libbox.a" "dist/librsb_libbox-ios-${{ matrix.name }}.a"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: rsb-libbox-ios-${{ matrix.name }}
          path: dist/librsb_libbox-ios-${{ matrix.name }}.a
          if-no-files-found: error

  build-mobile-headers:
    name: Mobile headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Upload rsbox.h
        uses: actions/upload-artifact@v5
        with:
          name: rsbox-mobile-headers
          path: crates/rsb-libbox/include/rsbox.h
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-desktop, build-android, build-ios, build-mobile-headers]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Package Android bundle
        run: |
          mkdir -p dist/bundle
          cp dist/librsb_libbox-android-*.so dist/bundle/ 2>/dev/null || true
          cp dist/rsbox.h dist/bundle/ 2>/dev/null || true
          cd dist/bundle && zip -r ../rsbox-android-libbox.zip .

      - name: Package iOS bundle
        run: |
          mkdir -p dist/bundle-ios
          cp dist/librsb_libbox-ios-*.a dist/bundle-ios/ 2>/dev/null || true
          cp dist/rsbox.h dist/bundle-ios/ 2>/dev/null || true
          cd dist/bundle-ios && zip -r ../rsbox-ios-libbox.zip .

      - name: List release assets
        run: find dist -type f ! -path 'dist/bundle/*' ! -path 'dist/bundle-ios/*' -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/rsbox-*
            dist/librsb_libbox-*
            dist/rsbox.h
            dist/rsbox-android-libbox.zip
            dist/rsbox-ios-libbox.zip
