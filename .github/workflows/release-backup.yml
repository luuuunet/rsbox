name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: rsbox ${{ steps.get_version.outputs.version }}
          body: |
            ## rsbox ${{ steps.get_version.outputs.version }}

            ### 功能特性
            - 🦀 纯 Rust 实现，内存安全
            - 🔌 支持 18 种入站 + 20 种出站协议
            - 🔐 内置 uTLS、REALITY、XTLS Vision
            - 🌐 Tailscale、WireGuard、DERP、gRPC API
            - ⚡ 零拷贝、异步 I/O、高性能
            - 📦 模块化设计，可按需编译

            ### 下载说明
            请根据您的操作系统下载对应的版本：
            - **Windows**: `rsbox-*-windows-*.zip`
            - **Linux**: `rsbox-*-linux-*.tar.gz`
            - **macOS**: `rsbox-*-macos-*.tar.gz`
            - **Android**: `rsbox-*-android-*.tar.gz` (需要 Termux 或 Root)

            ### 使用方法
            ```bash
            # 解压下载的文件
            # Windows: 使用 7zip 或 WinRAR
            # Linux/macOS: tar -xzf rsbox-*.tar.gz

            # 运行
            ./rsbox run -c config.json
            ```

            完整文档：https://github.com/luuuunet/rsbox
          draft: false
          prerelease: false

  build-and-upload:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64

          - target: i686-pc-windows-msvc
            os: windows-latest
            name: windows-i686

          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: windows-aarch64

          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-x86_64-musl

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-aarch64

          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            name: linux-armv7

          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            name: macos-x86_64

          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-aarch64

          # Android
          - target: aarch64-linux-android
            os: ubuntu-latest
            name: android-aarch64

          - target: armv7-linux-androideabi
            os: ubuntu-latest
            name: android-armv7

          - target: x86_64-linux-android
            os: ubuntu-latest
            name: android-x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --features rsb-protocol/wireguard-tunnel

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/rsbox.exe release/
          cp README.md LICENSE release/
          cd release
          7z a ../rsbox-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.zip *

      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/rsbox release/
          cp README.md LICENSE release/
          cd release
          tar czf ../rsbox-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.tar.gz *

      - name: Upload Release Asset (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./rsbox-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.zip
          asset_name: rsbox-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.zip
          asset_content_type: application/zip

      - name: Upload Release Asset (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./rsbox-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.tar.gz
          asset_name: rsbox-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.tar.gz
          asset_content_type: application/gzip

      - name: Generate checksums
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            certutil -hashfile rsbox-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.zip SHA256 > rsbox-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.zip.sha256
          else
            shasum -a 256 rsbox-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.tar.gz > rsbox-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.tar.gz.sha256
          fi
        shell: bash

  build-docker:
    name: Build Docker Images
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${{ needs.create-release.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            luuuunet/rsbox:latest
            luuuunet/rsbox:${{ steps.version.outputs.version }}
            ghcr.io/luuuunet/rsbox:latest
            ghcr.io/luuuunet/rsbox:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
