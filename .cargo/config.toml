[build]
# 增量编译
incremental = true

# 并行任务数（根据 CPU 核心数调整）
jobs = 8

# 使用 mold 链接器（Linux，需要安装）
# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# Windows 优化
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

# 通用优化标志
[target.'cfg(all())']
rustflags = [
    "-C", "target-cpu=native",  # 针对当前 CPU 优化（本地构建）
]

# 发布构建优化（取消注释使用）
# [profile.release]
# rustflags = [
#     "-C", "target-cpu=x86-64-v3",  # 兼容性更好的 CPU 目标
# ]

[term]
# 彩色输出
color = "auto"
verbose = false
